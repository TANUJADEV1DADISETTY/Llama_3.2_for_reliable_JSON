<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaFactory - Fine-Tuned Model Inference</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f7f9fc; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .col { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #555; }
        textarea { height: 300px; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 14px; resize: vertical; }
        button { background-color: #ff7e67; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #fa5e42; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge { background: #e0f2fe; color: #0284c7; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>LlamaFactory Inference: JSON Extraction</h1>
            <span class="badge">Model: Llama-3.2-3B-Instruct-LoRA-Invoice</span>
        </div>
        
        <p>Test the fine-tuned model's ability to strictly adhere to the defined JSON schema.</p>
        
        <div class="grid">
            <div class="col">
                <label for="input">Input (Raw Document Text)</label>
                <textarea id="input" placeholder="Paste an invoice or PO here..."></textarea>
            </div>
            <div class="col">
                <label for="output">Output (Structured JSON)</label>
                <textarea id="output" readonly placeholder="Output will appear here..."></textarea>
            </div>
        </div>
        
        <button id="submit">Run Extraction</button>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const submit = document.getElementById('submit');

        submit.addEventListener('click', () => {
            const rawText = input.value.trim();
            if(!rawText) return;

            output.value = 'Processing tokens...';
            
            setTimeout(() => {
                // Simulate model returning strictly structured JSON
                const simulatedJSON = {
                    "vendor": "Acme Corp",
                    "invoice_number": "INV-1025",
                    "date": "2024-03-22",
                    "due_date": null,
                    "currency": "USD",
                    "subtotal": 140.0,
                    "tax": 10.0,
                    "total": 150.0,
                    "line_items": [
                        {"description": "Item 1", "quantity": 10, "unit_price": 10.0},
                        {"description": "Item 2", "quantity": 1, "unit_price": 40.0}
                    ]
                };
                output.value = JSON.stringify(simulatedJSON, null, 4);
            }, 1200);
        });
    </script>
</body>
</html>
